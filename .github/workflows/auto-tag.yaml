name: auto-tag

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          token: ${{ secrets.PAT }}

      - name: Read version from pyproject.toml
        id: version
        run: |
          version=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['tool']['pack-binary']['project']['version'])
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          if gh api "repos/${{ github.repository }}/git/refs/tags/v${{ steps.version.outputs.version }}" --silent 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
