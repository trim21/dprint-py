name: release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build_wheels.yaml

  release:
    name: Release
    runs-on: ubuntu-slim
    needs: build
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels
          path: dist

      - uses: astral-sh/setup-uv@v8.3.1
        with:
          activate-environment: true

      - run: uv publish --no-progress
