name: build wheels

on:
  workflow_call:

jobs:
  wheels:
    runs-on: "ubuntu-24.04"
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7.6.0
        with:
          activate-environment: true

      - run: uv sync --locked

      - run: python build.py

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels
          path: dist
