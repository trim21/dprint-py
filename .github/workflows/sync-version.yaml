name: sync-version

on:
  push:
    branches:
      - master
  schedule:
    - cron: "37 14 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: true

      - run: uv sync --locked

      - name: Sync project version
        run: uv run python scripts/sync_version.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.PAT }}
          branch: sync/project-version
          commit-message: "chore: sync project.version to upstream"
          title: "chore: sync project.version to upstream"
          body: "Automatically synced `project.version` to match upstream `context.version`."
          delete-branch: true
